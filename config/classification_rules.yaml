# DocSort AI — Правила классификации документов
# ===============================================
# Правила для Варианта A (regex + ключевые слова)

document_types:
  # Счёт-фактура
  invoice:
    name: "Счёт-фактура"
    description: "Счёт-фактура на оплату товаров/услуг"
    output_dir: "счета-фактуры"
    keywords:
      - "счёт-фактура"
      - "счет-фактура"
      - "СЧЁТ-ФАКТУРА"
      - "СЧЕТ-ФАКТУРА"
      - "invoice"
    patterns:
      - "(?i)сч[её]т[\\s-]*фактур[аы]"
      - "(?i)счёт\\s*№\\s*\\d+"
      - "(?i)счет\\s*№\\s*\\d+"
      - "(?i)к\\s+оплате"
      - "(?i)итого\\s+к\\s+оплате"
    required_fields:
      - "ИНН"
      - "КПП"
    weight: 1.0
    filename_patterns:
      - "(?i)сч[её]т"
      - "(?i)invoice"
      - "(?i)sf[-_]"

  # Акт выполненных работ
  act:
    name: "Акт выполненных работ"
    description: "Акт приёмки выполненных работ/оказанных услуг"
    output_dir: "акты"
    keywords:
      - "акт выполненных работ"
      - "акт оказанных услуг"
      - "акт приёмки"
      - "акт приемки"
      - "АКТ"
    patterns:
      - "(?i)акт\\s+(выполненных|оказанных)"
      - "(?i)акт\\s+при[её]мки"
      - "(?i)акт\\s*№\\s*\\d+"
      - "(?i)исполнитель.*заказчик"
      - "(?i)заказчик.*исполнитель"
    required_fields:
      - "Исполнитель"
      - "Заказчик"
    weight: 1.0
    filename_patterns:
      - "(?i)акт"
      - "(?i)act"

  # Договор
  contract:
    name: "Договор"
    description: "Договор между юридическими/физическими лицами"
    output_dir: "договоры"
    keywords:
      - "ДОГОВОР"
      - "договор"
      - "контракт"
      - "соглашение"
    patterns:
      - "(?i)договор\\s*№\\s*\\d+"
      - "(?i)предмет\\s+договора"
      - "(?i)стороны\\s+договорились"
      - "(?i)настоящ(ий|им)\\s+договор"
      - "(?i)реквизиты\\s+сторон"
      - "(?i)подписи\\s+сторон"
    required_fields:
      - "Предмет договора"
    weight: 0.9
    filename_patterns:
      - "(?i)договор"
      - "(?i)contract"
      - "(?i)dogovor"

  # Товарная накладная ТОРГ-12
  waybill:
    name: "Товарная накладная ТОРГ-12"
    description: "Товарная накладная по форме ТОРГ-12"
    output_dir: "накладные"
    keywords:
      - "ТОРГ-12"
      - "ТОРГ12"
      - "товарная накладная"
      - "ТОВАРНАЯ НАКЛАДНАЯ"
      - "накладная"
    patterns:
      - "(?i)торг[\\s-]*12"
      - "(?i)товарная\\s+накладная"
      - "(?i)грузоотправитель"
      - "(?i)грузополучатель"
      - "(?i)наименование\\s+товара"
      - "(?i)единица\\s+измерения"
    required_fields:
      - "Грузоотправитель"
      - "Грузополучатель"
    weight: 1.0
    filename_patterns:
      - "(?i)торг"
      - "(?i)накладн"
      - "(?i)torg"

  # Платёжное поручение
  payment_order:
    name: "Платёжное поручение"
    description: "Платёжное поручение на перевод денежных средств"
    output_dir: "платежные_поручения"
    keywords:
      - "ПЛАТЁЖНОЕ ПОРУЧЕНИЕ"
      - "ПЛАТЕЖНОЕ ПОРУЧЕНИЕ"
      - "платёжное поручение"
      - "платежное поручение"
    patterns:
      - "(?i)плат[её]жное\\s+поручение"
      - "(?i)банк\\s+получателя"
      - "(?i)банк\\s+плательщика"
      - "(?i)\\bБИК\\b"
      - "(?i)р/с|р\\.с\\.|расч[её]тный\\s+сч[её]т"
      - "(?i)корр?\\.?\\s*сч[её]т"
    required_fields:
      - "БИК"
      - "Банк получателя"
    weight: 1.0
    filename_patterns:
      - "(?i)плат"
      - "(?i)payment"
      - "(?i)п\\.?п"

  # Неопознанный документ
  unknown:
    name: "Неопознанный документ"
    description: "Документ, не поддающийся автоматической классификации"
    output_dir: "неопознанные"
    keywords: []
    patterns: []
    required_fields: []
    weight: 0.0
    filename_patterns: []

# Общие паттерны для извлечения полей
field_patterns:
  inn:
    pattern: "(?i)инн\\s*:?\\s*(\\d{10,12})"
    description: "ИНН (10 или 12 цифр)"
  kpp:
    pattern: "(?i)кпп\\s*:?\\s*(\\d{9})"
    description: "КПП (9 цифр)"
  ogrn:
    pattern: "(?i)огрн\\s*:?\\s*(\\d{13,15})"
    description: "ОГРН (13 или 15 цифр)"
  bik:
    pattern: "(?i)бик\\s*:?\\s*(\\d{9})"
    description: "БИК (9 цифр)"
  date:
    pattern: "(\\d{2})[\\./](\\d{2})[\\./](\\d{4})"
    description: "Дата в формате ДД.ММ.ГГГГ"
  amount:
    pattern: "(?i)(?:итого|сумма|всего)[\\s:]*([\\d\\s]+[,.]\\d{2})"
    description: "Сумма документа"
  doc_number:
    pattern: "(?i)№\\s*(\\S+)"
    description: "Номер документа"
